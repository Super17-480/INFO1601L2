<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home</title>
</head>

<body>

<nav>
  <a href="index.html"><b>Home</b></a>
  <a href="signup.html"><b>Sign UP</b></a>
  <h1>Home</h1>
</nav>

<iframe width="560" height="315" loading="lazy"
src="https://www.youtube.com/embed/kg4Na-RbSrA"
frameborder="0"
allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture"
allowfullscreen>
</iframe>

<br><br>

<form action="../results.html" method="GET">

  <fieldset>
    <legend>Demographic Info</legend>

    <label>
      Full Name
      <input type="text" placeholder="Enter your name" name="fullname">
    </label>

    <br><br>

    <label>
      Sex
      <select name="sex">
        <option value="1">male</option>
        <option value="2">female</option>
        <option value="3">other</option>
      </select>
    </label>

    <br><br>

    <label for="dob">Date Of Birth</label>
    <input type="date" value="2000-01-01" name="dob">

  </fieldset>

  <br>

  <fieldset>
    <legend>Contact Info</legend>

    <label>
      Email
      <input type="email" name="email">
    </label>

    <br><br>

    <label>
      County
      <input list="counties" name="county">
      <datalist id="counties">
        <option value="Caroni">
        <option value="Mayaro">
        <option value="Nariva">
        <option value="Saint Andrew">
        <option value="Saint David">
        <option value="Saint George">
        <option value="Saint Patrick">
        <option value="Victoria">
      </datalist>
    </label>

    <br><br>

    <label>
      Telephone
      <input type="tel" name="telephone">
    </label>

  </fieldset>

  <br>

  <fieldset>
    <legend>Courses</legend>

    <label>
      <input type="checkbox" name="courses" value="info1601" checked>
      Info 1601
    </label>

    <label>
      <input type="checkbox" name="courses" value="comp1602">
      COMP 1602
    </label>

    <label>
      <input type="checkbox" name="courses" value="comp1603">
      COMP 1603
    </label>

    <label>
      <input type="checkbox" name="courses" value="comp1604">
      COMP 1604
    </label>

  </fieldset>

  <br>

  <input type="submit" value="Signup">

</form>

<script src="script.js"></script>

</body>
</html>
